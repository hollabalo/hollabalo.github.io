title: JM Gerona
tagline: Solutions Architect
description: "Solutions Architect · AWS SAA · CKAD · KCNA"
location: Taguig City, Metro Manila, Philippines

baseurl: "" #name of GitHub repository
url: "" #custom url to be used instead of GitHub repository

timezone: Asia/Manila

# Skills rendered as tag pills on the homepage and resume
skills:
  languages:
    - Java
    - Golang
    - Node.js
    - Shell / AWK
  architecture:
    - Event-Driven Architecture
    - Microservices
    - Apache Kafka
    - Distributed Systems
    - gRPC
  cloud:
    - AWS (SAA Certified)
    - Alibaba Cloud
    - Kubernetes (CKAD)
    - Docker
    - Serverless
  frameworks:
    - Spring Boot
    - Spring Batch
    - Spring MVC
    - Hibernate / JPA
    - React
  tools:
    - Git
    - Jenkins / GoCD
    - Redis
    - Oracle DB / PostgreSQL
    - Grafana / Kibana

# Social media links
linkedin: jmdgerona
stackoverflow: makalshrek
github: jmgerona

# Pagination
paginate: 4
permalink: /blog/:year/:title/
paginate_path: /blog/page:num/

# Markdown
highlighter: rouge
markdown: kramdown

# Tracker
analytics:

# optimization -> compress.html
compress_html:
  clippings: [html,div, p, ul, td, h1, h2, h3, h4,link, meta, footer, nav, img, header, hr, br, head, style, li, ul, ol, time, main, script, title]
  comments: ["<!-- ", " -->"]
  endings: [all]
  ignore:
    envs: [local]
  blanklines: false
  profile: false
  startings: []

sass:
  sass_dir: /assets/css/_sass
  style: compressed

include:
  - _pages

exclude:
  - README.md
  - LICENSE.md
  - vendor/
  - docker-compose.yml
  - Makefile
  - .idea/

plugins:
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-email-protect
  - jekyll-target-blank

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:name/
    order:
      - shortProject.md
      - longerProjectTitle.md
      - redirect.md
      - project4.md
      - project5.md
      - project6.md

  experiences:
    output: false
