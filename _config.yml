# Pagination
paginate: 8
permalink: /blog/:year/:title/
paginate_path: /blog/page:num/

# Jekyll Archives (creates archive pages)
jekyll-archives:
  enabled:
    - categories
  layouts:
    category: archive
  permalinks:
    category: /categories/:name/

# Markdown
highlighter: rouge
markdown: kramdown

# Tracker
analytics:

# Giscus (GitHub Discussions comments)
giscus:
  repo: "hollabalo/hollabalo.github.io" # your-username/your-repo
  repo-id: "MDEwOlJlcG9zaXRvcnkzMjE1MzAw" # Get from https://giscus.app setup
  category: "Blog Comments"
  category-id: "DIC_kwDOADEPxM4C57sC" # Get from https://giscus.app setup
  mapping: "pathname" # Discussion mapping (pathname, url, title, og:title, number, specific)
  reactions-enabled: "1" # Allow reactions (0 or 1)
  emit-metadata: "0" # Emit discussion metadata (0 or 1)
  input-position: "top" # Comment input position (top or bottom)
  theme: "preferred_color_scheme" # light, dark, dark_dimmed, preferred_color_scheme, transparent_dark
  lang: "en" # Language

# optimization -> compress.html
compress_html:
  clippings:
    [
      html,
      div,
      p,
      ul,
      td,
      h1,
      h2,
      h3,
      h4,
      link,
      meta,
      footer,
      nav,
      img,
      header,
      hr,
      br,
      head,
      style,
      li,
      ul,
      ol,
      time,
      main,
      script,
      title,
    ]
  comments: ["<!-- ", " -->"]
  endings: [all]
  ignore:
    envs: [local]
  blanklines: false
  profile: false
  startings: []

sass:
  sass_dir: /assets/css/_sass
  style: compressed

include:
  - _pages
  - tags

exclude:
  - README.md
  - LICENSE.md
  - vendor/
  - docker-compose.yml
  - Makefile
  - .idea/

plugins:
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-email-protect
  - jekyll-target-blank
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-last-modified-at

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:name/
    order:
      - account-offboarding.md
      - unlimited-limits.md
      - gcash-paymaya-interop.md
      - spending-limits.md
      - bdo-ivr-backoffice.md
      - amaysim-serverless.md

  experiences:
    output: false
